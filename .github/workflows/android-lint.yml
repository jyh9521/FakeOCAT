name: Android Lint

# 当推送到 main/master 分支或发起 Pull Request 时自动运行 Lint 检查
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  # 覆盖 gradle.properties 中硬编码的 Windows JDK 路径，使用 setup-java 提供的 JDK
  org.gradle.java.home: ''

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # Gradle 9.x 要求最低 JDK 21；使用 JDK 21 以满足 Gradle 需求
      # compileOptions 继续指定 Java 17 目标，两者兼容
      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 安装 compileSdk 35 所需的 Android SDK 组件
      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35'

      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 授予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 运行 Lint 检查
        run: ./gradlew lintDebug

      - name: 上传 Lint 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.html
